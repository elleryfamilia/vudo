    <path d="M392 53 L392 177" stroke="#EDE6DA"/>
    <!-- o -->
    <circle cx="485" cy="140" r="37" stroke="#EDE6DA"/>
  </g>
  <!-- terminal underscore cursor -->
  <rect x="559" y="168" width="50" height="22" rx="4" fill="#F2A33C" opacity="0.9"/>
