name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (x86_64 linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Set up cross toolchain (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: aarch64-unknown-linux-musl

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          target="${{ matrix.target }}"
          stage="vudo-${tag}-${target}"
          mkdir "$stage"
          cp README.md LICENSE "$stage/"
          if [[ "$target" == *windows* ]]; then
            cp "target/$target/release/vudo.exe" "$stage/"
            7z a "${stage}.zip" "$stage" >/dev/null
            asset="${stage}.zip"
          else
            cp "target/$target/release/vudo" "$stage/"
            tar czf "${stage}.tar.gz" "$stage"
            asset="${stage}.tar.gz"
          fi
          if command -v sha256sum >/dev/null; then
            sha256sum "$asset" > "${asset}.sha256"
          else
            shasum -a 256 "$asset" > "${asset}.sha256"
          fi
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          fail_on_unmatched_files: true
